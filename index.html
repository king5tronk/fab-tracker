<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f0f1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>FAB Tracker</title>
<style>
  :root{--bg:#0f0f1a;--bg2:#1a1a2e;--bg3:#16213e;--accent:#e94560;--accent2:#f5a623;--text:#e0e0e0;--text2:#9090a0;--card-bg:#1e1e32;--border:#2a2a45;--green:#4caf50;--radius:12px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;}
  .header{background:linear-gradient(135deg,#0f0f1a,#1a1a2e);border-bottom:1px solid var(--border);padding:14px 16px;position:sticky;top:0;z-index:100;}
  .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .logo{display:flex;align-items:center;gap:10px;}
  .logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;}
  .logo-text{font-size:17px;font-weight:700;}
  .logo-sub{font-size:10px;color:var(--text2);}
  .missing-badge{background:var(--accent);color:#fff;border-radius:20px;padding:5px 13px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;}
  .search-bar{position:relative;}
  .search-bar input{width:100%;padding:9px 14px 9px 38px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:14px;outline:none;transition:border-color .2s;}
  .search-bar input:focus{border-color:var(--accent);}
  .search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text2);}
  .nav-tabs{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);}
  .nav-tabs::-webkit-scrollbar{display:none;}
  .tab-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap;}
  .tab-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
  .main{padding:14px;}
  .sets-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
  .set-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:13px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
  .set-card:hover{border-color:var(--accent);transform:translateY(-2px);}
  .set-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));}
  .set-code{font-size:10px;color:var(--accent2);font-weight:700;letter-spacing:1px;text-transform:uppercase;}
  .set-name{font-size:13px;font-weight:600;margin:4px 0;line-height:1.3;}
  .set-count{font-size:11px;color:var(--text2);}
  .set-missing{position:absolute;top:8px;right:8px;background:var(--accent);color:#fff;border-radius:10px;padding:2px 7px;font-size:10px;font-weight:700;}
  .cards-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
  .back-btn{background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:7px 13px;border-radius:var(--radius);cursor:pointer;font-size:13px;white-space:nowrap;}
  .cards-header h2{font-size:15px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .view-toggle{display:flex;gap:4px;flex-shrink:0;}
  .vt-btn{padding:5px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);font-size:13px;cursor:pointer;}
  .vt-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  .img-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .img-card{position:relative;border-radius:10px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:border-color .15s,transform .15s;background:var(--card-bg);}
  .img-card:hover{transform:scale(1.03);}
  .img-card.selected{border-color:var(--accent);}
  .img-card img{width:100%;aspect-ratio:5/7;object-fit:cover;display:block;}
  .img-placeholder{width:100%;aspect-ratio:5/7;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text2);font-size:10px;text-align:center;padding:6px;gap:4px;}
  .img-placeholder .pi{font-size:22px;}
  .img-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.88));padding:6px 5px 5px;pointer-events:none;}
  .img-name{font-size:9px;font-weight:700;color:#fff;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .p1c{background:#e53935;} .p2c{background:#ffd600;} .p3c{background:#43a047;}
  .pdot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:3px;vertical-align:middle;}
  .qty-badge{position:absolute;top:5px;right:5px;background:var(--accent);color:#fff;border-radius:10px;padding:2px 7px;font-size:11px;font-weight:700;}
  .img-controls{position:absolute;top:5px;left:5px;display:flex;gap:3px;}
  .ic-btn{width:22px;height:22px;border-radius:50%;border:none;background:rgba(0,0,0,.7);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .ic-btn:hover{background:var(--accent);}
  .card-item{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:7px;display:flex;align-items:center;gap:10px;transition:border-color .2s;}
  .card-item.has-missing{border-color:var(--accent);}
  .card-thumb{width:40px;height:56px;border-radius:5px;object-fit:cover;flex-shrink:0;background:var(--bg3);}
  .card-thumb-ph{width:40px;height:56px;border-radius:5px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
  .card-info{flex:1;min-width:0;cursor:pointer;}
  .card-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .card-meta{font-size:11px;color:var(--text2);margin-top:2px;}
  .qty-control{display:flex;align-items:center;gap:5px;flex-shrink:0;}
  .qty-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
  .qty-btn:hover{background:var(--accent);border-color:var(--accent);}
  .qty-num{width:20px;text-align:center;font-size:15px;font-weight:700;color:var(--accent2);}
  .missing-section{margin-bottom:20px;}
  .missing-section h3{font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
  .missing-item{background:var(--card-bg);border:1px solid var(--accent);border-radius:var(--radius);padding:9px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px;}
  .missing-thumb{width:34px;height:48px;border-radius:5px;object-fit:cover;flex-shrink:0;background:var(--bg3);}
  .missing-info{flex:1;min-width:0;}
  .missing-name{font-size:13px;font-weight:600;}
  .missing-set{font-size:11px;color:var(--text2);}
  .missing-qty{background:var(--accent);color:#fff;border-radius:8px;padding:3px 9px;font-size:13px;font-weight:700;flex-shrink:0;}
  .export-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:var(--radius);color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:14px;}
  .clear-btn{width:100%;padding:10px;background:transparent;border:1px solid var(--border);border-radius:var(--radius);color:var(--text2);font-size:13px;cursor:pointer;margin-top:8px;}
  .clear-btn:hover{border-color:var(--accent);color:var(--accent);}
  .empty-state{text-align:center;padding:50px 20px;color:var(--text2);}
  .empty-state .icon{font-size:44px;margin-bottom:10px;}
  .loader{text-align:center;padding:40px;color:var(--text2);}
  .spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
  .toast.show{opacity:1;}
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:center;justify-content:center;padding:16px;}
  .modal-bg.open{display:flex;}
  .modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:18px;max-width:320px;width:100%;position:relative;max-height:90vh;overflow-y:auto;}
  .modal img{width:100%;border-radius:10px;margin-bottom:12px;}
  .modal-name{font-size:17px;font-weight:700;margin-bottom:3px;}
  .modal-meta{font-size:12px;color:var(--text2);margin-bottom:14px;}
  .modal-label{font-size:12px;color:var(--text2);text-align:center;margin-bottom:10px;}
  .modal-qty-row{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:14px;}
  .modal-qty-btn{width:38px;height:38px;border-radius:50%;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .modal-qty-btn:hover{background:var(--accent);border-color:var(--accent);}
  .modal-qty-num{font-size:26px;font-weight:700;color:var(--accent2);min-width:40px;text-align:center;}
  .modal-close{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;}
  .modal-add-btn{width:100%;padding:11px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:var(--radius);color:#fff;font-size:14px;font-weight:700;cursor:pointer;}
  .search-info{font-size:12px;color:var(--text2);margin-bottom:12px;padding:8px 12px;background:var(--bg2);border-radius:8px;}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">⚔️</div>
      <div><div class="logo-text">FAB Tracker</div><div class="logo-sub">Flesh and Blood</div></div>
    </div>
    <div class="missing-badge" onclick="showMissingView()">🗒️ <span id="totalMissing">0</span> missing</div>
  </div>
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search all cards..." oninput="onSearch(this.value)">
  </div>
</div>
<div class="nav-tabs" id="navTabs"></div>
<div class="main" id="mainContent"><div class="loader"><div class="spinner"></div><p>Loading card data...</p></div></div>
<div class="toast" id="toast"></div>
<div class="modal-bg" id="modalBg" onclick="closeModalOutside(event)">
  <div class="modal" id="modalBox">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <img id="modalImg" src="" alt="" onerror="this.style.display='none'">
    <div class="modal-name" id="modalName"></div>
    <div class="modal-meta" id="modalMeta"></div>
    <div class="modal-label">How many do you need?</div>
    <div class="modal-qty-row">
      <button class="modal-qty-btn" onclick="modalDelta(-1)">−</button>
      <div class="modal-qty-num" id="modalQtyNum">0</div>
      <button class="modal-qty-btn" onclick="modalDelta(1)">+</button>
    </div>
    <button class="modal-add-btn" onclick="modalSave()">✓ Save to missing list</button>
  </div>
</div>
<script>
// ─── DATA SOURCES ───────────────────────────────────────────────
// All card data from the-fab-cube open source repo (community maintained)
// Images from FABtcg official CDN
const RAW = 'https://raw.githubusercontent.com/the-fab-cube/flesh-and-blood-cards/develop/json/english/';
const IMG  = 'https://storage.googleapis.com/fabmaster/media/images/';

let allCards = [];   // full flat card list
let allSets  = [];   // [{id, name, cards:[]}]
let setMap   = {};   // id -> set
let cardMap  = {};   // unique_id -> card
let missing  = JSON.parse(localStorage.getItem('fab_missing') || '{}');
let viewMode = 'image';
let currentSet  = null;
let currentCards = [];
let modalCard = null, modalTmpQty = 0;

// ─── INIT ────────────────────────────────────────────────────────
async function init() {
  try {
    const [cardRes, setRes] = await Promise.all([
      fetch(RAW + 'card.json'),
      fetch(RAW + 'set.json')
    ]);
    allCards = await cardRes.json();
    const rawSets = await setRes.json();

    // Build set lookup
    rawSets.forEach(s => {
      setMap[s.id] = { id: s.id, name: s.name, cards: [] };
    });

    // Index cards
    allCards.forEach(c => {
      cardMap[c.unique_id] = c;
      // attach card to its set(s) via printings
      const setIds = new Set();
      if (c.printings) c.printings.forEach(p => { if (p.set_id) setIds.add(p.set_id); });
      if (c.set_id) setIds.add(c.set_id);
      setIds.forEach(sid => { if (setMap[sid]) setMap[sid].cards.push(c); });
    });

    allSets = Object.values(setMap).filter(s => s.cards.length > 0)
                    .sort((a, b) => a.name.localeCompare(b.name));

    buildTabs();
    renderSetsView();
    updateBadge();
  } catch(e) {
    document.getElementById('mainContent').innerHTML =
      `<div class="empty-state"><div class="icon">⚠️</div><p>Could not load card data.<br><small>${e.message}</small></p></div>`;
  }
}

// ─── HELPERS ─────────────────────────────────────────────────────
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function saveMissing() { localStorage.setItem('fab_missing', JSON.stringify(missing)); updateBadge(); }
function updateBadge() { document.getElementById('totalMissing').textContent = Object.values(missing).reduce((s,v)=>s+v,0); }
function showToast(m) { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }

function imgUrl(c) {
  if (c.printings && c.printings.length) {
    for (const p of c.printings) {
      if (p.image_url) return p.image_url;
      if (p.id) return IMG + p.id + '.width-450.png';
    }
  }
  if (c.image_url) return c.image_url;
  return '';
}

function pitchLabel(p) { return p==1?'Red':p==2?'Yellow':p==3?'Blue':''; }
function pitchClass(p) { return p==1?'p1c':p==2?'p2c':p==3?'p3c':''; }

// ─── TABS ────────────────────────────────────────────────────────
function buildTabs() {
  document.getElementById('navTabs').innerHTML =
    `<button class="tab-btn active" onclick="tabClick('sets',this)">All Sets</button>
     <button class="tab-btn" onclick="tabClick('missing',this)">🗒️ My List</button>`;
}
function tabClick(view, btn) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('searchInput').value = '';
  if (view==='sets') renderSetsView();
  else showMissingView();
}

// ─── SETS VIEW ───────────────────────────────────────────────────
function getMissingForSet(setId) {
  if (!setMap[setId]) return 0;
  return setMap[setId].cards.reduce((s,c) => s + (missing[c.unique_id]||0), 0);
}

function renderSetsView() {
  currentSet = null;
  const el = document.getElementById('mainContent');
  let h = '<div class="sets-grid">';
  allSets.forEach(s => {
    const mis = getMissingForSet(s.id);
    h += `<div class="set-card" onclick="openSet('${esc(s.id)}')">
      ${mis>0?`<div class="set-missing">${mis}</div>`:''}
      <div class="set-code">${esc(s.id)}</div>
      <div class="set-name">${esc(s.name)}</div>
      <div class="set-count">${s.cards.length} cards</div>
    </div>`;
  });
  el.innerHTML = h + '</div>';
}

// ─── CARDS VIEW ──────────────────────────────────────────────────
function openSet(setId) {
  currentSet = setMap[setId];
  currentCards = currentSet.cards;
  renderCards(currentCards, currentSet.name);
}

function renderCards(cards, title, isSearch=false) {
  const el = document.getElementById('mainContent');
  const backBtn = isSearch
    ? `<button class="back-btn" onclick="clearSearch()">✕ Clear</button>`
    : `<button class="back-btn" onclick="renderSetsView()">← Back</button>`;
  let h = `<div class="cards-header">
    ${backBtn}
    <h2>${esc(title)}</h2>
    <div class="view-toggle">
      <button class="vt-btn ${viewMode==='image'?'active':''}" onclick="setView('image',this)">▦</button>
      <button class="vt-btn ${viewMode==='list'?'active':''}" onclick="setView('list',this)">☰</button>
    </div>
  </div>`;
  if (isSearch) h += `<div class="search-info">Found ${cards.length} card${cards.length!==1?'s':''}</div>`;
  if (!cards.length) { el.innerHTML = h + `<div class="empty-state"><div class="icon">🔍</div><p>No cards found.</p></div>`; return; }
  el.innerHTML = h + (viewMode==='image' ? renderImageGrid(cards) : renderListView(cards));
}

function renderImageGrid(cards) {
  let h = '<div class="img-grid">';
  cards.forEach(c => {
    const id = c.unique_id, qty = missing[id]||0, url = imgUrl(c);
    h += `<div class="img-card ${qty>0?'selected':''}" id="ic_${id}" onclick="openModal('${esc(id)}')">
      ${url
        ? `<img src="${esc(url)}" alt="${esc(c.name)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
           <div class="img-placeholder" style="display:none"><div class="pi">🃏</div><div>${esc(c.name)}</div></div>`
        : `<div class="img-placeholder"><div class="pi">🃏</div><div>${esc(c.name)}</div></div>`}
      <div class="img-overlay">
        ${c.pitch?`<span class="pdot ${pitchClass(c.pitch)}"></span>`:''}
        <span class="img-name">${esc(c.name)}</span>
      </div>
      ${qty>0?`<div class="qty-badge">${qty}x</div>`:''}
      <div class="img-controls">
        <button class="ic-btn" onclick="quickDelta(event,'${esc(id)}',-1)">−</button>
        <button class="ic-btn" onclick="quickDelta(event,'${esc(id)}',1)">+</button>
      </div>
    </div>`;
  });
  return h + '</div>';
}

function renderListView(cards) {
  let h = '';
  cards.forEach(c => {
    const id = c.unique_id, qty = missing[id]||0, url = imgUrl(c);
    h += `<div class="card-item ${qty>0?'has-missing':''}" id="li_${id}">
      ${url
        ? `<img class="card-thumb" src="${esc(url)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=card-thumb-ph>🃏</div>'">`
        : `<div class="card-thumb-ph">🃏</div>`}
      <div class="card-info" onclick="openModal('${esc(id)}')">
        <div class="card-name">${esc(c.name)}</div>
        <div class="card-meta">${c.pitch?`<span class="pdot ${pitchClass(c.pitch)}" style="display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:3px;vertical-align:middle;"></span>${pitchLabel(c.pitch)} · `:''} ${esc(c.type_text||'')}</div>
      </div>
      <div class="qty-control">
        <button class="qty-btn" onclick="quickDelta(event,'${esc(id)}',-1)">−</button>
        <div class="qty-num" id="qn_${id}">${qty}</div>
        <button class="qty-btn" onclick="quickDelta(event,'${esc(id)}',1)">+</button>
      </div>
    </div>`;
  });
  return h;
}

function setView(mode, btn) {
  viewMode = mode;
  document.querySelectorAll('.vt-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const title = currentSet ? currentSet.name : 'Search results';
  const isSearch = !currentSet;
  renderCards(currentCards, title, isSearch);
}

// ─── QUANTITY ────────────────────────────────────────────────────
function quickDelta(e, id, delta) {
  e.stopPropagation();
  const nxt = Math.max(0, (missing[id]||0) + delta);
  if (nxt===0) delete missing[id]; else missing[id]=nxt;
  saveMissing();
  const ic = document.getElementById('ic_'+id);
  if (ic) {
    ic.classList.toggle('selected', nxt>0);
    let b = ic.querySelector('.qty-badge');
    if (nxt>0) { if(!b){b=document.createElement('div');b.className='qty-badge';ic.appendChild(b);} b.textContent=nxt+'x'; }
    else if (b) b.remove();
  }
  const li = document.getElementById('li_'+id);
  if (li) { li.classList.toggle('has-missing',nxt>0); const q=document.getElementById('qn_'+id); if(q) q.textContent=nxt; }
}

// ─── MODAL ───────────────────────────────────────────────────────
function openModal(id) {
  modalCard = cardMap[id] || { unique_id: id, name: id };
  modalTmpQty = missing[id] || 0;
  document.getElementById('modalName').textContent = modalCard.name || id;
  const meta = [pitchLabel(modalCard.pitch), modalCard.type_text].filter(Boolean).join(' · ');
  document.getElementById('modalMeta').textContent = meta;
  const url = imgUrl(modalCard);
  const img = document.getElementById('modalImg');
  img.src = url; img.style.display = url ? 'block' : 'none';
  document.getElementById('modalQtyNum').textContent = modalTmpQty;
  document.getElementById('modalBg').classList.add('open');
}
function closeModal() { document.getElementById('modalBg').classList.remove('open'); modalCard=null; }
function closeModalOutside(e) { if(e.target===document.getElementById('modalBg')) closeModal(); }
function modalDelta(d) { modalTmpQty=Math.max(0,modalTmpQty+d); document.getElementById('modalQtyNum').textContent=modalTmpQty; }
function modalSave() {
  if (!modalCard) return;
  const id = modalCard.unique_id;
  if (modalTmpQty===0) delete missing[id]; else missing[id]=modalTmpQty;
  saveMissing();
  quickDelta({stopPropagation:()=>{}}, id, 0); // just refresh display
  // force refresh display
  const ic=document.getElementById('ic_'+id);
  if(ic){
    ic.classList.toggle('selected',modalTmpQty>0);
    let b=ic.querySelector('.qty-badge');
    if(modalTmpQty>0){if(!b){b=document.createElement('div');b.className='qty-badge';ic.appendChild(b);}b.textContent=modalTmpQty+'x';}
    else if(b) b.remove();
  }
  const li=document.getElementById('li_'+id);
  if(li){li.classList.toggle('has-missing',modalTmpQty>0);const q=document.getElementById('qn_'+id);if(q)q.textContent=modalTmpQty;}
  showToast(modalTmpQty>0?`${modalTmpQty}x ${modalCard.name} saved!`:'Removed from list');
  closeModal();
}

// ─── SEARCH (local, instant) ─────────────────────────────────────
function onSearch(q) {
  q = q.trim().toLowerCase();
  if (!q) { clearSearch(); return; }
  const results = allCards.filter(c => c.name && c.name.toLowerCase().includes(q)).slice(0, 80);
  currentCards = results;
  currentSet = null;
  renderCards(results, `"${q}"`, true);
}
function clearSearch() {
  document.getElementById('searchInput').value = '';
  if (currentSet) renderCards(currentSet.cards, currentSet.name);
  else renderSetsView();
}

// ─── MISSING VIEW ────────────────────────────────────────────────
function showMissingView() {
  const el = document.getElementById('mainContent');
  const entries = Object.entries(missing).filter(([,v])=>v>0);
  if (!entries.length) {
    el.innerHTML=`<div class="empty-state"><div class="icon">✅</div><p>No missing cards yet!<br>Browse sets and add cards.</p></div>`;
    return;
  }
  const bySet = {};
  entries.forEach(([id,qty]) => {
    const c = cardMap[id] || { unique_id: id, name: id };
    let setKey = '?';
    if (c.printings && c.printings[0] && c.printings[0].set_id) setKey = c.printings[0].set_id;
    else if (c.set_id) setKey = c.set_id;
    if (!bySet[setKey]) bySet[setKey]=[];
    bySet[setKey].push({...c, qty});
  });
  let h = '';
  for (const [sk, cards] of Object.entries(bySet).sort()) {
    const setName = setMap[sk]?.name || sk;
    h += `<div class="missing-section"><h3>${esc(setName)}</h3>`;
    cards.forEach(c => {
      const url = imgUrl(c);
      h += `<div class="missing-item">
        ${url?`<img class="missing-thumb" src="${esc(url)}" alt="" onerror="this.style.display='none'">` :''}
        <div class="missing-info"><div class="missing-name">${esc(c.name)}</div><div class="missing-set">${esc(sk)}</div></div>
        <div class="missing-qty">${c.qty}x</div>
      </div>`;
    });
    h += '</div>';
  }
  h += `<button class="export-btn" onclick="exportList()">📋 Copy as text list</button>
        <button class="clear-btn" onclick="clearAll()">🗑️ Clear all</button>`;
  el.innerHTML = h;
}

function exportList() {
  const lines = Object.entries(missing).filter(([,v])=>v>0)
    .map(([id,qty]) => `${qty}x ${(cardMap[id]||{name:id}).name}`);
  const txt = lines.join('\n');
  if (navigator.clipboard) navigator.clipboard.writeText(txt).then(()=>showToast('Copied!'));
  else { const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('Copied!'); }
}

function clearAll() {
  if (confirm('Clear the entire missing list?')) { missing={}; saveMissing(); showMissingView(); }
}

init();
</script>

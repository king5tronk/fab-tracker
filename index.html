<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f0f1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>FAB Binder</title>
<style>
:root{--bg:#0f0f1a;--bg2:#1a1a2e;--bg3:#16213e;--accent:#e94560;--accent2:#f5a623;--text:#e0e0e0;--text2:#9090a0;--card-bg:#1e1e32;--border:#2a2a45;--green:#4caf50;--radius:12px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;}

/* HEADER */
.header{background:linear-gradient(135deg,#0f0f1a,#1a1a2e);border-bottom:1px solid var(--border);padding:14px 16px;position:sticky;top:0;z-index:100;}
.header-top{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;}
.logo-text{font-size:17px;font-weight:700;}
.logo-sub{font-size:10px;color:var(--text2);}
.header-actions{display:flex;gap:8px;align-items:center;}
.hdr-btn{padding:7px 13px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:12px;cursor:pointer;white-space:nowrap;transition:all .2s;}
.hdr-btn:hover,.hdr-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
.search-bar{position:relative;margin-top:10px;}
.search-bar input{width:100%;padding:9px 14px 9px 38px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:14px;outline:none;transition:border-color .2s;}
.search-bar input:focus{border-color:var(--accent);}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text2);}

.main{padding:14px;}

/* BINDER LIST */
.binders-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
.binder-card{border-radius:var(--radius);cursor:pointer;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s;aspect-ratio:3/4;display:flex;flex-direction:column;justify-content:flex-end;}
.binder-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.5);}
.binder-cover{position:absolute;inset:0;background:linear-gradient(135deg,var(--c1,#1a1a2e),var(--c2,#2a2a45));display:flex;align-items:center;justify-content:center;font-size:48px;}
.binder-spine{position:absolute;left:0;top:0;bottom:0;width:12px;background:rgba(0,0,0,.4);}
.binder-info{position:relative;background:linear-gradient(transparent,rgba(0,0,0,.9));padding:10px 10px 10px 16px;}
.binder-name{font-size:14px;font-weight:700;margin-bottom:2px;}
.binder-set{font-size:11px;color:var(--accent2);}
.binder-stats{font-size:11px;color:var(--text2);margin-top:3px;}
.binder-del{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.6);border:none;color:var(--text2);width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;z-index:2;}
.binder-del:hover{background:var(--accent);color:#fff;}
.new-binder{border:2px dashed var(--border);background:var(--bg2);border-radius:var(--radius);aspect-ratio:3/4;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:8px;transition:border-color .2s;}
.new-binder:hover{border-color:var(--accent);}
.new-binder .nb-icon{font-size:32px;}
.new-binder span{font-size:13px;color:var(--text2);}

/* CARD GRID */
.page-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.back-btn{background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:7px 13px;border-radius:var(--radius);cursor:pointer;font-size:13px;white-space:nowrap;}
.page-title{flex:1;min-width:0;}
.page-title h2{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.page-title p{font-size:11px;color:var(--accent2);}
.view-toggle{display:flex;gap:4px;flex-shrink:0;}
.vt-btn{padding:5px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);font-size:13px;cursor:pointer;}
.vt-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}

/* PROGRESS BAR */
.progress-bar{background:var(--bg2);border-radius:8px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.pb-track{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.pb-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .4s;}
.pb-label{font-size:12px;color:var(--text2);white-space:nowrap;}

/* CARD IMAGES */
.img-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.img-card{position:relative;border-radius:9px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:transform .15s;}
.img-card:hover{transform:scale(1.04);}
.img-card img{width:100%;aspect-ratio:5/7;object-fit:cover;display:block;transition:filter .3s;}
.img-placeholder{width:100%;aspect-ratio:5/7;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;text-align:center;padding:4px;gap:3px;transition:filter .3s;}
.ph-icon{font-size:20px;}

/* Owned states */
.img-card[data-owned="0"] img,
.img-card[data-owned="0"] .img-placeholder{filter:grayscale(100%) brightness(.45);}
.img-card[data-owned="1"] img,
.img-card[data-owned="1"] .img-placeholder{filter:grayscale(40%) brightness(.75);}
.img-card[data-owned="2"] img,
.img-card[data-owned="2"] .img-placeholder{filter:grayscale(15%) brightness(.9);}
.img-card[data-owned="3"] img,
.img-card[data-owned="3"] .img-placeholder{filter:none;}

.img-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.85));padding:5px 5px 4px;pointer-events:none;}
.img-name{font-size:8.5px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;}
.pdot{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:2px;vertical-align:middle;}
.p1c{background:#e53935;}.p2c{background:#ffd600;}.p3c{background:#43a047;}
.qty-badge{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.75);color:var(--accent2);border-radius:8px;padding:1px 6px;font-size:11px;font-weight:700;border:1px solid var(--accent2);}
.qty-badge.full{background:var(--accent2);color:#000;}
.img-controls{position:absolute;top:4px;left:4px;display:flex;gap:2px;}
.ic-btn{width:20px;height:20px;border-radius:50%;border:none;background:rgba(0,0,0,.7);color:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;}
.ic-btn:hover{background:var(--accent);}

/* LIST VIEW */
.card-item{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:9px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px;transition:border-color .2s,opacity .2s;}
.card-item[data-owned="0"]{opacity:.4;}
.card-item[data-owned="3"]{border-color:var(--accent2);}
.card-thumb{width:38px;height:53px;border-radius:5px;object-fit:cover;flex-shrink:0;background:var(--bg3);transition:filter .3s;}
.card-item[data-owned="0"] .card-thumb{filter:grayscale(1);}
.card-ph{width:38px;height:53px;border-radius:5px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.card-info{flex:1;min-width:0;cursor:pointer;}
.card-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-meta{font-size:11px;color:var(--text2);margin-top:2px;}
.qty-ctrl{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.qty-btn{width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.qty-btn:hover{background:var(--accent);border-color:var(--accent);}
.qty-num{width:20px;text-align:center;font-size:14px;font-weight:700;color:var(--accent2);}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:300;align-items:center;justify-content:center;padding:16px;}
.modal-bg.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:18px;max-width:300px;width:100%;position:relative;}
.modal-close{position:absolute;top:11px;right:13px;background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;}
.modal img{width:100%;border-radius:9px;margin-bottom:11px;}
.modal-img-ph{width:100%;aspect-ratio:5/7;background:var(--bg3);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:11px;}
.modal-name{font-size:16px;font-weight:700;margin-bottom:2px;}
.modal-meta{font-size:12px;color:var(--text2);margin-bottom:12px;}
.modal-owned-label{font-size:12px;color:var(--text2);text-align:center;margin-bottom:8px;}
.modal-qty-row{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:14px;}
.mq-btn{width:40px;height:40px;border-radius:50%;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.mq-btn:hover{background:var(--accent);border-color:var(--accent);}
.mq-num{font-size:30px;font-weight:700;color:var(--accent2);min-width:44px;text-align:center;}
.modal-pips{display:flex;gap:6px;justify-content:center;margin-bottom:14px;}
.pip{width:12px;height:12px;border-radius:50%;background:var(--border);transition:background .2s;}
.pip.on{background:var(--accent2);}
.modal-save{width:100%;padding:11px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:var(--radius);color:#fff;font-size:14px;font-weight:700;cursor:pointer;}

/* CREATE BINDER MODAL */
.create-modal{max-width:340px;}
.create-modal h3{font-size:16px;font-weight:700;margin-bottom:14px;}
.field{margin-bottom:12px;}
.field label{font-size:12px;color:var(--text2);display:block;margin-bottom:5px;}
.field input,.field select{width:100%;padding:9px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:14px;outline:none;}
.field input:focus,.field select:focus{border-color:var(--accent);}
.field select option{background:var(--bg2);}
.color-row{display:flex;gap:8px;flex-wrap:wrap;}
.color-swatch{width:32px;height:32px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:border-color .15s;}
.color-swatch.picked{border-color:#fff;}
.emoji-row{display:flex;gap:8px;flex-wrap:wrap;font-size:22px;}
.emoji-opt{cursor:pointer;padding:4px;border-radius:6px;border:2px solid transparent;transition:border-color .15s;}
.emoji-opt.picked{border-color:var(--accent);}
.create-btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:var(--radius);color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;}

/* EXPORT */
.export-btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:var(--radius);color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:12px;}

/* MISC */
.empty-state{text-align:center;padding:50px 20px;color:var(--text2);}
.empty-state .icon{font-size:44px;margin-bottom:10px;}
.loader{text-align:center;padding:40px;color:var(--text2);}
.spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}
.filter-row{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none;}
.filter-row::-webkit-scrollbar{display:none;}
.f-btn{flex-shrink:0;padding:5px 12px;border-radius:16px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s;}
.f-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">📚</div>
      <div><div class="logo-text">FAB Binder</div><div class="logo-sub">Flesh and Blood</div></div>
    </div>
    <div class="header-actions">
      <button class="hdr-btn" id="backHeaderBtn" style="display:none" onclick="goHome()">← Home</button>
      <button class="hdr-btn primary" id="exportHeaderBtn" style="display:none" onclick="exportBinder()">📋 Export</button>
    </div>
  </div>
  <div class="search-bar" id="searchBar" style="display:none">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search cards in this binder..." oninput="onSearch(this.value)">
  </div>
</div>

<div class="main" id="mainContent">
  <div class="loader"><div class="spinner"></div><p>Loading card data…</p></div>
</div>

<div class="toast" id="toast"></div>

<!-- CARD MODAL -->
<div class="modal-bg" id="cardModal" onclick="closeCardModalOutside(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeCardModal()">✕</button>
    <img id="cm-img" src="" alt="" onerror="this.style.display='none';document.getElementById('cm-ph').style.display='flex'">
    <div class="modal-img-ph" id="cm-ph" style="display:none">🃏</div>
    <div class="modal-name" id="cm-name"></div>
    <div class="modal-meta" id="cm-meta"></div>
    <div class="modal-owned-label">Copies owned</div>
    <div class="modal-qty-row">
      <button class="mq-btn" onclick="cmDelta(-1)">−</button>
      <div class="mq-num" id="cm-qty">0</div>
      <button class="mq-btn" onclick="cmDelta(1)">+</button>
    </div>
    <div class="modal-pips" id="cm-pips">
      <div class="pip" id="pip0"></div>
      <div class="pip" id="pip1"></div>
      <div class="pip" id="pip2"></div>
    </div>
    <button class="modal-save" onclick="cmSave()">✓ Save</button>
  </div>
</div>

<!-- CREATE BINDER MODAL -->
<div class="modal-bg" id="createModal" onclick="closeCreateOutside(event)">
  <div class="modal create-modal">
    <button class="modal-close" onclick="closeCreate()">✕</button>
    <h3>New Binder</h3>
    <div class="field">
      <label>Name</label>
      <input type="text" id="cb-name" placeholder="e.g. My Main Collection">
    </div>
    <div class="field">
      <label>Set</label>
      <div class="search-bar" style="margin-bottom:6px;">
        <span class="search-icon">🔍</span>
        <input type="text" id="cb-set-search" placeholder="Search sets…" oninput="filterSetList(this.value)" autocomplete="off">
      </div>
      <select id="cb-set" size="5" style="border-radius:var(--radius);height:auto;padding:4px 0;"><option value="">— Loading sets… —</option></select>
      <div style="font-size:11px;color:var(--text2);margin-top:6px;">⚠️ Very new sets (e.g. Omens of the Third Age / OMN, released June 5 2026) may not yet appear — the community data source updates within days of release.</div>
    </div>
    <div class="field">
      <label>Cover color</label>
      <div class="color-row" id="cb-colors"></div>
    </div>
    <div class="field">
      <label>Cover icon</label>
      <div class="emoji-row" id="cb-emojis"></div>
    </div>
    <button class="create-btn" onclick="createBinder()">Create Binder</button>
  </div>
</div>

<script>
const RAW = 'https://raw.githubusercontent.com/the-fab-cube/flesh-and-blood-cards/develop/json/english/';
const IMG  = 'https://storage.googleapis.com/fabmaster/media/images/';

const COLORS = [
  ['#1a237e','#283593'],['#880e4f','#ad1457'],['#1b5e20','#2e7d32'],
  ['#4a148c','#6a1b9a'],['#e65100','#f57c00'],['#006064','#00838f'],
  ['#37474f','#546e7a'],['#3e2723','#5d4037']
];
const EMOJIS = ['⚔️','🛡️','🧙','🏹','🔥','❄️','⚡','🌿','💀','👑','🐉','🌟'];

let allCards=[], allSets=[], setMap={}, cardMap={};
let binders = JSON.parse(localStorage.getItem('fab_binders')||'[]');
// binders: [{id, name, setId, color[c1,c2], emoji, owned:{uid:qty}}]

let currentBinder = null;
let currentCards  = [];
let viewMode      = 'image';
let filterMode    = 'all'; // all | owned | missing
let cmCardId      = null, cmQty = 0;
let cbColor       = COLORS[0], cbEmoji = EMOJIS[0];
let searchQ       = '';

// ── INIT ────────────────────────────────────────────────────────
async function init(){
  try{
    const [cr,sr]=await Promise.all([fetch(RAW+'card.json'),fetch(RAW+'set.json')]);
    allCards=await cr.json(); const rawSets=await sr.json();
    rawSets.forEach(s=>{ setMap[s.id]={id:s.id,name:s.name,cards:[]}; });
    allCards.forEach(c=>{
      cardMap[c.unique_id]=c;
      const ids=new Set();
      if(c.printings) c.printings.forEach(p=>{ if(p.set_id) ids.add(p.set_id); });
      if(c.set_id) ids.add(c.set_id);
      ids.forEach(sid=>{ if(setMap[sid]) setMap[sid].cards.push(c); });
    });
    allSets=Object.values(setMap).filter(s=>s.cards.length>0).sort((a,b)=>a.name.localeCompare(b.name));
    buildCreateForm();
    renderHome();
  }catch(e){
    document.getElementById('mainContent').innerHTML=
      `<div class="empty-state"><div class="icon">⚠️</div><p>Could not load card data.<br><small>${e.message}</small></p></div>`;
  }
}

// ── HELPERS ─────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function save(){localStorage.setItem('fab_binders',JSON.stringify(binders));}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
function imgUrl(c){
  if(c.printings&&c.printings.length){
    for(const p of c.printings){ if(p.image_url) return p.image_url; if(p.id) return IMG+p.id+'.width-450.png'; }
  }
  return c.image_url||'';
}
function pitchClass(p){return p==1?'p1c':p==2?'p2c':p==3?'p3c':'';}
function pitchLabel(p){return p==1?'Red':p==2?'Yellow':p==3?'Blue':'';}
function ownedState(qty){return Math.min(qty,3);}

function binderOwned(b){ return Object.values(b.owned||{}).reduce((s,v)=>s+Math.min(v,1),0); }
function binderTotal(b){ return (setMap[b.setId]||{cards:[]}).cards.length; }

// ── HOME ────────────────────────────────────────────────────────
function renderHome(){
  currentBinder=null; searchQ='';
  document.getElementById('backHeaderBtn').style.display='none';
  document.getElementById('exportHeaderBtn').style.display='none';
  document.getElementById('searchBar').style.display='none';
  const el=document.getElementById('mainContent');
  if(!allSets.length){el.innerHTML='<div class="loader"><div class="spinner"></div><p>Loading…</p></div>';return;}
  let h='<div class="binders-grid">';
  binders.forEach((b,i)=>{
    const owned=binderOwned(b), total=binderTotal(b), pct=total?Math.round(owned/total*100):0;
    const setName=(setMap[b.setId]||{name:b.setId}).name;
    h+=`<div class="binder-card" onclick="openBinder(${i})" style="--c1:${esc(b.color[0])};--c2:${esc(b.color[1])}">
      <div class="binder-cover">${esc(b.emoji)}</div>
      <div class="binder-spine"></div>
      <button class="binder-del" onclick="deleteBinder(event,${i})">✕</button>
      <div class="binder-info">
        <div class="binder-name">${esc(b.name)}</div>
        <div class="binder-set">${esc(setName)}</div>
        <div class="binder-stats">${owned}/${total} cards · ${pct}%</div>
      </div>
    </div>`;
  });
  h+=`<div class="new-binder" onclick="openCreate()">
    <div class="nb-icon">➕</div><span>New Binder</span>
  </div></div>`;
  el.innerHTML=h;
}
function goHome(){renderHome();}

// ── DELETE BINDER ────────────────────────────────────────────────
function deleteBinder(e,i){
  e.stopPropagation();
  if(confirm(`Delete "${binders[i].name}"?`)){binders.splice(i,1);save();renderHome();}
}

// ── OPEN BINDER ─────────────────────────────────────────────────
function openBinder(i){
  currentBinder=binders[i];
  currentCards=(setMap[currentBinder.setId]||{cards:[]}).cards;
  filterMode='all'; searchQ='';
  document.getElementById('backHeaderBtn').style.display='';
  document.getElementById('exportHeaderBtn').style.display='';
  document.getElementById('searchBar').style.display='';
  document.getElementById('searchInput').value='';
  renderBinder();
}

function getFilteredCards(){
  let cards=currentCards;
  if(searchQ) cards=cards.filter(c=>c.name&&c.name.toLowerCase().includes(searchQ));
  if(filterMode==='owned') cards=cards.filter(c=>(currentBinder.owned||{})[c.unique_id]>0);
  if(filterMode==='missing') cards=cards.filter(c=>!((currentBinder.owned||{})[c.unique_id]>=3));
  return cards;
}

function renderBinder(){
  const el=document.getElementById('mainContent');
  const owned=binderOwned(currentBinder), total=binderTotal(currentBinder), pct=total?Math.round(owned/total*100):0;
  const setName=(setMap[currentBinder.setId]||{name:currentBinder.setId}).name;
  let h=`<div class="page-header">
    <div class="page-title"><h2>${esc(currentBinder.name)}</h2><p>${esc(setName)}</p></div>
    <div class="view-toggle">
      <button class="vt-btn ${viewMode==='image'?'active':''}" onclick="setView('image',this)">▦</button>
      <button class="vt-btn ${viewMode==='list'?'active':''}" onclick="setView('list',this)">☰</button>
    </div>
  </div>
  <div class="progress-bar">
    <div class="pb-track"><div class="pb-fill" style="width:${pct}%"></div></div>
    <div class="pb-label">${owned}/${total} · ${pct}%</div>
  </div>
  <div class="filter-row">
    <button class="f-btn ${filterMode==='all'?'active':''}" onclick="setFilter('all',this)">All (${total})</button>
    <button class="f-btn ${filterMode==='owned'?'active':''}" onclick="setFilter('owned',this)">Owned (${owned})</button>
    <button class="f-btn ${filterMode==='missing'?'active':''}" onclick="setFilter('missing',this)">Missing (${total-owned})</button>
  </div>`;
  const cards=getFilteredCards();
  if(!cards.length){h+=`<div class="empty-state"><div class="icon">🔍</div><p>No cards match.</p></div>`;}
  else{ h+=viewMode==='image'?renderImgGrid(cards):renderListV(cards); }
  el.innerHTML=h;
}

function setFilter(f,btn){
  filterMode=f;
  document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderBinder();
}
function setView(m,btn){
  viewMode=m;
  document.querySelectorAll('.vt-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderBinder();
}

// ── IMAGE GRID ───────────────────────────────────────────────────
function renderImgGrid(cards){
  let h='<div class="img-grid">';
  cards.forEach(c=>{
    const id=c.unique_id, qty=(currentBinder.owned||{})[id]||0, state=ownedState(qty), url=imgUrl(c);
    h+=`<div class="img-card" id="ic_${id}" data-owned="${state}" onclick="openCardModal('${esc(id)}')">
      ${url
        ?`<img src="${esc(url)}" alt="${esc(c.name)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="img-placeholder" style="display:none"><div class="ph-icon">🃏</div><div>${esc(c.name)}</div></div>`
        :`<div class="img-placeholder"><div class="ph-icon">🃏</div><div>${esc(c.name)}</div></div>`}
      <div class="img-overlay">
        ${c.pitch?`<span class="pdot ${pitchClass(c.pitch)}"></span>`:''}
        <span class="img-name">${esc(c.name)}</span>
      </div>
      ${qty>0?`<div class="qty-badge ${qty>=3?'full':''}">${qty}x</div>`:''}
      <div class="img-controls">
        <button class="ic-btn" onclick="quickDelta(event,'${esc(id)}',-1)">−</button>
        <button class="ic-btn" onclick="quickDelta(event,'${esc(id)}',1)">+</button>
      </div>
    </div>`;
  });
  return h+'</div>';
}

// ── LIST VIEW ────────────────────────────────────────────────────
function renderListV(cards){
  let h='';
  cards.forEach(c=>{
    const id=c.unique_id, qty=(currentBinder.owned||{})[id]||0, state=ownedState(qty), url=imgUrl(c);
    h+=`<div class="card-item" id="li_${id}" data-owned="${state}">
      ${url?`<img class="card-thumb" src="${esc(url)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=card-ph>🃏</div>'">`
           :`<div class="card-ph">🃏</div>`}
      <div class="card-info" onclick="openCardModal('${esc(id)}')">
        <div class="card-name">${esc(c.name)}</div>
        <div class="card-meta">${c.pitch?`<span class="pdot ${pitchClass(c.pitch)}" style="display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:3px;vertical-align:middle;"></span>${pitchLabel(c.pitch)} · `:''} ${esc(c.type_text||'')}</div>
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="quickDelta(event,'${esc(id)}',-1)">−</button>
        <div class="qty-num" id="qn_${id}">${qty}</div>
        <button class="qty-btn" onclick="quickDelta(event,'${esc(id)}',1)">+</button>
      </div>
    </div>`;
  });
  return h;
}

// ── QUICK DELTA ─────────────────────────────────────────────────
function quickDelta(e, id, d){
  e.stopPropagation();
  if(!currentBinder.owned) currentBinder.owned={};
  const nxt=Math.max(0,(currentBinder.owned[id]||0)+d);
  if(nxt===0) delete currentBinder.owned[id]; else currentBinder.owned[id]=nxt;
  save();
  refreshCard(id,nxt);
}

function refreshCard(id,qty){
  const state=ownedState(qty);
  const ic=document.getElementById('ic_'+id);
  if(ic){
    ic.dataset.owned=state;
    let b=ic.querySelector('.qty-badge');
    if(qty>0){
      if(!b){b=document.createElement('div');b.className='qty-badge';ic.appendChild(b);}
      b.textContent=qty+'x'; b.className='qty-badge'+(qty>=3?' full':'');
    } else if(b) b.remove();
  }
  const li=document.getElementById('li_'+id);
  if(li){ li.dataset.owned=state; const q=document.getElementById('qn_'+id); if(q) q.textContent=qty; }
}

// ── CARD MODAL ───────────────────────────────────────────────────
function openCardModal(id){
  cmCardId=id;
  const c=cardMap[id]||{unique_id:id,name:id};
  cmQty=(currentBinder.owned||{})[id]||0;
  const url=imgUrl(c);
  const img=document.getElementById('cm-img'), ph=document.getElementById('cm-ph');
  if(url){img.src=url;img.style.display='block';ph.style.display='none';}
  else{img.style.display='none';ph.style.display='flex';}
  document.getElementById('cm-name').textContent=c.name||id;
  document.getElementById('cm-meta').textContent=[pitchLabel(c.pitch),c.type_text].filter(Boolean).join(' · ');
  document.getElementById('cm-qty').textContent=cmQty;
  updatePips();
  document.getElementById('cardModal').classList.add('open');
}
function closeCardModal(){document.getElementById('cardModal').classList.remove('open');cmCardId=null;}
function closeCardModalOutside(e){if(e.target===document.getElementById('cardModal'))closeCardModal();}
function cmDelta(d){cmQty=Math.max(0,cmQty+d);document.getElementById('cm-qty').textContent=cmQty;updatePips();}
function updatePips(){
  for(let i=0;i<3;i++) document.getElementById('pip'+i).className='pip'+(i<cmQty?' on':'');
}
function cmSave(){
  if(!cmCardId) return;
  if(!currentBinder.owned) currentBinder.owned={};
  if(cmQty===0) delete currentBinder.owned[cmCardId]; else currentBinder.owned[cmCardId]=cmQty;
  save();
  refreshCard(cmCardId,cmQty);
  showToast(cmQty>0?`${cmQty}x saved!`:'Removed');
  closeCardModal();
}

// ── SEARCH ──────────────────────────────────────────────────────
function onSearch(q){ searchQ=q.trim().toLowerCase(); renderBinder(); }

// ── EXPORT ──────────────────────────────────────────────────────
function exportBinder(){
  if(!currentBinder) return;
  const lines=Object.entries(currentBinder.owned||{}).filter(([,v])=>v>0)
    .map(([id,qty])=>`${qty}x ${(cardMap[id]||{name:id}).name}`);
  if(!lines.length){showToast('No cards to export');return;}
  const txt=`${currentBinder.name}\n${'─'.repeat(currentBinder.name.length)}\n`+lines.join('\n');
  if(navigator.clipboard) navigator.clipboard.writeText(txt).then(()=>showToast('Copied!'));
  else{const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('Copied!');}
}

// ── CREATE BINDER ───────────────────────────────────────────────
function filterSetList(q){
  const sel=document.getElementById('cb-set');
  const opts=sel.querySelectorAll('option');
  const lq=q.trim().toLowerCase();
  opts.forEach(o=>{ o.style.display=(!lq||o.textContent.toLowerCase().includes(lq)||o.value.toLowerCase().includes(lq))?'':'none'; });
}

function buildCreateForm(){
  const sel=document.getElementById('cb-set');
  sel.innerHTML='<option value="">— Choose a set —</option>';
  allSets.forEach(s=>{ const o=document.createElement('option');o.value=s.id;o.textContent=`${s.name} (${s.id})`;sel.appendChild(o); });

  const cr=document.getElementById('cb-colors');
  COLORS.forEach((c,i)=>{
    const d=document.createElement('div');
    d.className='color-swatch'+(i===0?' picked':'');
    d.style.background=`linear-gradient(135deg,${c[0]},${c[1]})`;
    d.onclick=()=>{cbColor=c;document.querySelectorAll('.color-swatch').forEach(x=>x.classList.remove('picked'));d.classList.add('picked');};
    cr.appendChild(d);
  });

  const er=document.getElementById('cb-emojis');
  EMOJIS.forEach((em,i)=>{
    const d=document.createElement('div');
    d.className='emoji-opt'+(i===0?' picked':'');
    d.textContent=em;
    d.onclick=()=>{cbEmoji=em;document.querySelectorAll('.emoji-opt').forEach(x=>x.classList.remove('picked'));d.classList.add('picked');};
    er.appendChild(d);
  });
}

function openCreate(){document.getElementById('createModal').classList.add('open');}
function closeCreate(){document.getElementById('createModal').classList.remove('open');}
function closeCreateOutside(e){if(e.target===document.getElementById('createModal'))closeCreate();}

function createBinder(){
  const name=document.getElementById('cb-name').value.trim();
  const setId=document.getElementById('cb-set').value;
  if(!name){alert('Please enter a name.');return;}
  if(!setId){alert('Please choose a set.');return;}
  const b={id:Date.now().toString(),name,setId,color:cbColor,emoji:cbEmoji,owned:{}};
  binders.push(b); save(); closeCreate();
  document.getElementById('cb-name').value='';
  document.getElementById('cb-set').value='';
  const idx=binders.length-1;
  renderHome();
  openBinder(idx);
}

init();
</script>
